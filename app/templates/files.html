{% extends "base.html" %}
{% block main %}
<h1>Uploaded Images</h1>
<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; padding: 16px;">
    {% for image in images %}
    <div>
        <img src="{{ url_for('get_image', filename=image) }}" 
             style="width: 100%; height: 200px; object-fit: cover;" 
             alt="{{ image }}">
    </div>
    {% endfor %}
</div>
{% endblock %}
